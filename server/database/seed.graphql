mutation SeedPlanBoard {
    group1: upsertPlanLabelGroup(
    create: { title: "Development", key: "1", groupLabels: {connect: [ {title: "Draft"}, {title: "Review"}, {title: "Needs Edit"}, {title: "Scheduled"}, {title: "Unscheduled"} ] }}
    update: { title: "Development",  key: "1", groupLabels: {connect: [ {title: "Draft"}, {title: "Review"}, {title: "Needs Edit"}, {title: "Scheduled"}, {title: "Unscheduled"} ] }}
    where: { key: "1" }
  ) {
    key
  }
    group2: upsertPlanLabelGroup(
    create: { title: "Tracking",  key: "2", groupLabels: {connect: [ {title: "Unscheduled"}, {title: "Scheduled"}, {title: "Past Due"}, {title: "Injected"}, {title: "Incomplete"}, {title: "Complete"}, {title: "Deferred"} ] }}
    update: { title: "Tracking",  key: "2", groupLabels: {connect: [ {title: "Unscheduled"}, {title: "Scheduled"}, {title: "Past Due"}, {title: "Injected"}, {title: "Incomplete"}, {title: "Complete"}, {title: "Deferred"} ] }}
    where: { key: "2" }
  ) {
    key
  }
}

