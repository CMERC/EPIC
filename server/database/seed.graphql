mutation SeedJointStaffValue {
jointStaffValue1: upsertPlanJointStaffTrainingPriority(
  create: {title: "Transregional Joint Training", description: "Every priority strategic challenge is transregional in nature, as potential adversaries’ interests, influence, capabilities, and reach extend beyond single geographic regions. Joint training must specifically address the higher-level collaboration of the Joint Staff with OSD, as well as horizontal coordination among CCMDs, to achieve desired effects.", key: "1"}
  update: {title: "Transregional Joint Training", description: "Every priority strategic challenge is transregional in nature, as potential adversaries’ interests, influence, capabilities, and reach extend beyond single geographic regions. Joint training must specifically address the higher-level collaboration of the Joint Staff with OSD, as well as horizontal coordination among CCMDs, to achieve desired effects.", key: "1"}
  where: {key: "1"}){key}
jointStaffValue2: upsertPlanJointStaffTrainingPriority(
  create: {title: "Multi-domain Joint Training", description: "The Joint Force must compete and win in every domain: air, land, sea, space, and cyberspace, as well as the overall information environment. Adversaries continue to innovate and adapt in these domains to erode U.S. advantages. Future joint, multi-domain training needs to be enabled by increased reliance on distributed, synthetic training (live/constructive) using secure/protected networks supported by common foundational architectures and standards. Improving joint training approaches and exercise scenarios for contested domains and emphasizing cross-domain synergy throughout joint training programs will develop a Joint Force that can think and operate in this multi-domain environment.", key: "2"}
  update: {title: "Multi-domain Joint Training", description: "The Joint Force must compete and win in every domain: air, land, sea, space, and cyberspace, as well as the overall information environment. Adversaries continue to innovate and adapt in these domains to erode U.S. advantages. Future joint, multi-domain training needs to be enabled by increased reliance on distributed, synthetic training (live/constructive) using secure/protected networks supported by common foundational architectures and standards. Improving joint training approaches and exercise scenarios for contested domains and emphasizing cross-domain synergy throughout joint training programs will develop a Joint Force that can think and operate in this multi-domain environment.", key: "2"}
  where: {key: "2"}) {key}
jointStaffValue3: upsertPlanJointStaffTrainingPriority(
  create: {title: "Multi-functional Joint Training", description: "Overlapping crises and increased adversary capabilities place competing demands on finite critical joint resources, such as intelligence, surveillance, and reconnaissance (ISR), cyberspace operations, space operations, information operations (and the special access program equivalents), cruise and ballistic missile defense, and joint logistics. The Joint Force should replicate these challenges within training programs, including the processes for prioritizing and allocating high-demand, low-density forces and capabilities.", key: "3"}
  update: {title: "Multi-functional Joint Training", description: "Overlapping crises and increased adversary capabilities place competing demands on finite critical joint resources, such as intelligence, surveillance, and reconnaissance (ISR), cyberspace operations, space operations, information operations (and the special access program equivalents), cruise and ballistic missile defense, and joint logistics. The Joint Force should replicate these challenges within training programs, including the processes for prioritizing and allocating high-demand, low-density forces and capabilities.", key: "3"}
  where: {key: "3"}) {key}
jointStaffValue4: upsertPlanJointStaffTrainingPriority(
  create: {title: "Partner Integration in Joint Training", description: "The Joint Force must continue to mature a network of willing and capable training partners, including interagency, industry, and non-governmental organizations, to succeed in this operating environment. CCMDs and Services best leverage the capabilities of organizational, allied nation, and other mission partners through training programs that exercise and capitalize on their contributions to the mission. CCMDs will prioritize combined exercises with likely partners for joint contingency operations to enhance interoperability, maintain readiness, build partner capacity and assurance, and improve regional access and understanding.", key: "4"}
  update: {title: "Partner Integration in Joint Training", description: "The Joint Force must continue to mature a network of willing and capable training partners, including interagency, industry, and non-governmental organizations, to succeed in this operating environment. CCMDs and Services best leverage the capabilities of organizational, allied nation, and other mission partners through training programs that exercise and capitalize on their contributions to the mission. CCMDs will prioritize combined exercises with likely partners for joint contingency operations to enhance interoperability, maintain readiness, build partner capacity and assurance, and improve regional access and understanding.", key: "4"}
  where: {key: "4"}) {key}
jointStaffValue5: upsertPlanJointStaffTrainingPriority(
  create: {title: "Contested Environments in Joint Training", description: "Training scenarios and exercises should reflect advanced contested environments and the impact of potential attrition on the Joint Force. Multiple competitors are using contested environment strategies to limit U.S. options. The proliferation of threats in the future security environment requires the Joint Force to maintain operational effectiveness while absorbing successful attacks (e.g. loss of force projection assets; degraded Position, Navigation, and Timing; space; Command and Control (C2) systems; and reduced access to the electro-magnetic spectrum). Countering these strategies and gaining proficiency in strategic and operational movement and maneuver requires multiple agencies and CCMDs to plan, train, exercise, and execute together.", key: "5"}
  update: {title: "Contested Environments in Joint Training", description: "Training scenarios and exercises should reflect advanced contested environments and the impact of potential attrition on the Joint Force. Multiple competitors are using contested environment strategies to limit U.S. options. The proliferation of threats in the future security environment requires the Joint Force to maintain operational effectiveness while absorbing successful attacks (e.g. loss of force projection assets; degraded Position, Navigation, and Timing; space; Command and Control (C2) systems; and reduced access to the electro-magnetic spectrum). Countering these strategies and gaining proficiency in strategic and operational movement and maneuver requires multiple agencies and CCMDs to plan, train, exercise, and execute together.", key: "5"}
  where: {key: "5"}) {key}
jointStaffValue6: upsertPlanJointStaffTrainingPriority(
  create: {title: "Conventional and SOF Interoperability in Joint Training", description: "The current strategic environment is compressing decision cycles and response times. Therefore, training programs must emphasize special operations and conventional force integration, interoperability, and interdependence so that forces arrive in theater prepared to operate as part of a joint team in a contested environment across multiple domains.", key: "6"}
  update: {title: "Conventional and SOF Interoperability in Joint Training", description: "The current strategic environment is compressing decision cycles and response times. Therefore, training programs must emphasize special operations and conventional force integration, interoperability, and interdependence so that forces arrive in theater prepared to operate as part of a joint team in a contested environment across multiple domains.", key: "6"}
  where: {key: "6"}) {key}
jointStaffValue7: upsertPlanJointStaffTrainingPriority(
  create: {title: "Joint Force Leaders in Joint Training", description: "A Joint Force composed of agile and adaptive leaders and organizations who can innovate and critically think through dynamic problems in an increasingly TMM threat environment remains fundamental to the success of the Joint Force. The Joint Force’s aim must be to develop, educate, and train leaders to fully understand the TMM threat environment, anticipate and adapt to uncertainty, and operate with mutual trust in fellow leaders that are empowered through mission command. These strong joint leaders of character will need to think critically and strategically, and confidently address the toughest problems to assure future success", key: "7"}
  update: {title: "Joint Force Leaders in Joint Training", description: "A Joint Force composed of agile and adaptive leaders and organizations who can innovate and critically think through dynamic problems in an increasingly TMM threat environment remains fundamental to the success of the Joint Force. The Joint Force’s aim must be to develop, educate, and train leaders to fully understand the TMM threat environment, anticipate and adapt to uncertainty, and operate with mutual trust in fellow leaders that are empowered through mission command. These strong joint leaders of character will need to think critically and strategically, and confidently address the toughest problems to assure future success", key: "7"}
  where: {key: "7"}) {key}
jointStaffValue8: upsertPlanJointStaffTrainingPriority(
  create: {title: "Countering Weapons of Mass Destruction in Joint Training", description: "Actors of concern pose a threat of developing, acquiring, proliferating, or employing weapons of mass destruction (WMD) and related capabilities: expertise, materials, technologies, and means of delivery. These activities present a clear threat to the strategic objectives of the United States. State or non-state adversaries may use WMD to exploit U.S. power projection, sustainment, and force protection vulnerabilities, or deny access to an area or region. The Joint Force must ensure that the United States, allied nations, and its partners are neither attacked nor coerced by adversaries with WMD. Exercises and training should prepare the Joint Force to conduct CWMD activities, including: preventing the proliferation of WMD and its associated technologies; preventing new WMD development; securing and reducing WMD stockpiles; deterring the use of WMD, and disrupting or defeating WMD programs.", key: "8"}
  update: {title: "Countering Weapons of Mass Destruction in Joint Training", description: "Actors of concern pose a threat of developing, acquiring, proliferating, or employing weapons of mass destruction (WMD) and related capabilities: expertise, materials, technologies, and means of delivery. These activities present a clear threat to the strategic objectives of the United States. State or non-state adversaries may use WMD to exploit U.S. power projection, sustainment, and force protection vulnerabilities, or deny access to an area or region. The Joint Force must ensure that the United States, allied nations, and its partners are neither attacked nor coerced by adversaries with WMD. Exercises and training should prepare the Joint Force to conduct CWMD activities, including: preventing the proliferation of WMD and its associated technologies; preventing new WMD development; securing and reducing WMD stockpiles; deterring the use of WMD, and disrupting or defeating WMD programs.", key: "8"}
  where: {key: "8"}) {key}
}
