projects:
  app:
    schemaPath: "src/schema.graphql"
    extensions:
      endpoints:
        dev: "http://localhost:4000/graphql"
        staging: "https://staging.epicready.com/graphql"
        production: "https://app.epicready.com/graphql"
  database:
    schemaPath: "src/generated/prisma.graphql"
    extensions:
      prisma: database/prisma.yml